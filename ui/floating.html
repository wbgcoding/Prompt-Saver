<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prompt</title>
  <link rel="stylesheet" href="styles/floating.css" />
</head>
<body>
  <button id="pill" class="pill" type="button">
    <span id="label" class="label">Prompt</span>
    <span id="feedback" class="feedback">Kopiert!</span>
  </button>

  <!-- Right-click menu: size presets, edit prompt, remove pill -->
  <div id="menu" class="menu hidden">
    <div class="size-row">
      <span id="size-label" class="size-label">Size</span>
      <button type="button" data-scale="0.75">S</button>
      <button type="button" data-scale="1">M</button>
      <button type="button" data-scale="1.4">L</button>
    </div>
    <button id="menu-edit" type="button">Edit prompt</button>
    <button id="menu-remove" type="button" class="danger">Remove</button>
  </div>

  <script type="module" src="floating.js"></script>
</body>
</html>
